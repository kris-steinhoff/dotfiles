# ~/.config/tmux/tmux.conf

# --- General ------------------------------------------------------------

# True color + correct default terminal so nvim/starship render properly.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"

# Don't wait after Escape. Without this nvim feels laggy inside tmux.
set -sg escape-time 10

# Let nvim's autoread and focus-dependent plugins work.
set -g focus-events on

# Bigger scrollback.
set -g history-limit 50000

# Mouse: scroll, select panes, resize by dragging.
set -g mouse on

# Start window/pane numbering at 1 and keep it gapless.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Let programs set the terminal title.
set -g set-titles on
set -g set-titles-string "#S:#W"

# --- Key bindings -------------------------------------------------------

# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits that keep the current working directory, with intuitive keys.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows keep the current working directory.
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode ----------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Status bar (tokyonight, no Nerd Font glyphs) -----------------------

set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left-length 30
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] "

set -g status-right-length 60
set -g status-right "#[bg=#414868,fg=#c0caf5] #h "

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[bg=#414868,fg=#7dcfff,bold] #I:#W "

set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

set -g message-style "bg=#7aa2f7,fg=#1a1b26"
